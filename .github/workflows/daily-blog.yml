name: Daily Blog Generator

on:
  schedule:
    - cron: '30 8 * * *' # Every day at 08:30 UTC
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate Blog Post and Prices
        run: node scripts/generate-blog.js

      - name: Git Auto Commit
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: daily update (blog & prices) [skip ci]"
          branch: main
          file_pattern: 'blog/*.html sitemap.xml assets/data/*.json index.html'
